    <main class="page-main">
        <section class="section">
            <div class="container" style="max-width: 600px;">
                <p style="text-align: center; margin-bottom: 3rem;">
                    お問い合わせは以下のフォームよりお願いいたします。<br>
                    必須項目は必ずご記入ください。
                </p>
                
                <form action="mailto:tagawa1129@outlook.com" method="post" enctype="text/plain" class="contact-form">
                    <div class="form-group">
                        <label for="name">お名前 <span class="required">必須</span></label>
                        <input type="text" id="name" name="名前" required placeholder="例：山田 太郎">
                    </div>
                    
                    <div class="form-group">
                        <label for="furigana">フリガナ <span class="optional">任意</span></label>
                        <input type="text" id="furigana" name="フリガナ" placeholder="例：ヤマダ タロウ">
                    </div>
                    
                    <div class="form-group">
                        <label for="email">メールアドレス <span class="required">必須</span></label>
                        <input type="email" id="email" name="メールアドレス" required placeholder="例：info@example.com">
                    </div>
                    
                    <div class="form-group">
                        <label for="message">お問い合わせ内容 <span class="required">必須</span></label>
                        <textarea id="message" name="お問い合わせ内容" rows="8" required placeholder="お問い合わせ内容をご記入ください。"></textarea>
                    </div>
                    
                    <div class="form-submit" style="text-align: center; margin-top: 2rem;">
                        <button type="submit" class="btn submit-btn">送信する</button>
                    </div>
                </form>
            </div>
        </section>
